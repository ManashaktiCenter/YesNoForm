<!DOCTYPE html>
<html>
<head>
<title>Assessment Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#e8f5e9;
}

/* HEADER */
header{
    background:linear-gradient(to right,#1b5e20,#43a047);
    color:white;
    text-align:center;
    padding:15px;
    position:sticky;
    top:0;
}

/* PAGE */
.page{
    display:none;
    padding:20px;
    animation:fadeIn 0.5s;
}

.active{
    display:block;
}

/* QUESTION CARD */
.q-card{
    background:white;
    padding:18px;
    margin:15px 0;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.q-card:hover{
    transform:scale(1.02);
}

/* QUESTION TEXT */
.q-text{
    font-size:16px;
    margin-bottom:10px;
}

/* OPTIONS */
.options{
    display:flex;
    gap:10px;
}

.btn-option{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.yes{
    background:#4caf50;
    color:white;
}

.no{
    background:#f44336;
    color:white;
}

.btn-option:hover{
    opacity:0.8;
}

/* NAV BUTTON */
.nav{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2e7d32;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* RESULT */
.result-box{
    background:white;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.progress-wrap{
    width:100%;
    height:6px;
    background:#ddd;
    position:sticky;
    top:60px;
    z-index:999;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(to right,#4caf50,#00c853);
    transition:0.3s ease;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* TOGGLE WRAPPER */
.toggle{
    display:inline-block;
    margin:5px;
}

/* HIDE RADIO */
.toggle input{
    display:none;
}

/* BASE STYLE */
.slider{
    display:inline-block;
    padding:10px 25px;
    border-radius:30px;
    background:white;
    border:2px solid #ccc;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
    user-select:none;
}

/* YES ACTIVE */
.slider.yes.active{
    background:#4caf50;
    color:white;
    border-color:#4caf50;
}

/* NO ACTIVE */
.slider.no.active{
    background:#f44336;
    color:white;
    border-color:#f44336;
}

/* HOVER EFFECT */
.slider:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<header>
    <h2>Student Assessment Test</h2>
</header>
<div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div id="progressText" style="text-align:center;font-size:13px;margin-top:5px;">
    Progress: 0%
</div>

<!-- PAGES -->
<div id="pages"></div>

<!-- NAV -->
<div class="nav" style="padding:20px;">
    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>
</div>

<!-- SUBMIT -->
<div style="text-align:center; display:none;" id="submitBtn">
    <button onclick="showResult()">Submit Test</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="page">
    <div class="result-box">
        <h2>Result</h2>
        <p id="resultText"></p>
    </div>
</div>

<script>

/* =======================
   YOUR 122 QUESTIONS
======================= */
let questions = Array.from({length:122}, (_,i)=>
`Question ${i+1}: Sample statement here`
);

/* STORE ANSWERS */
let answers = new Array(122).fill(null);

/* SPLIT INTO PAGES */
let perPage = 25;
let totalPages = Math.ceil(questions.length / perPage);
let currentPage = 0;

/* CREATE PAGES */
function renderPages(){

    let container = document.getElementById("pages");

    for(let p=0; p<totalPages; p++){

        let page = document.createElement("div");
        page.className = "page";
        if(p===0) page.classList.add("active");

        let start = p * perPage;
        let end = start + perPage;

        for(let i=start; i<end && i<questions.length; i++){

            let div = document.createElement("div");
            div.className = "q-card";

            div.innerHTML = `
                <div class="q-text">${questions[i]}</div>

               <label class="toggle">
    <input type="radio" name="q${i}" onclick="selectAnswer(${i},1,this)">
    <span class="slider yes">YES</span>
</label>

<label class="toggle">
    <input type="radio" name="q${i}" onclick="selectAnswer(${i},0,this)">
    <span class="slider no">NO</span>
</label>
            `;

            page.appendChild(div);
        }

        container.appendChild(page);
    }
}

renderPages();

/* ANSWER SAVE */
function selectAnswer(index,value,el){

    answers[index]=value;

    // 🔊 click sound
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();

    // remove active from both
    let parent = el.parentElement.parentElement;
    let options = parent.querySelectorAll(".slider");

    options.forEach(o=>{
        o.classList.remove("active");
    });

    // add active
    el.nextElementSibling?.classList.add("active") || el.classList.add("active");

    // progress update
    updateProgress();

    // 🔥 AUTO NEXT QUESTION
    setTimeout(()=>{
        let next = parent.nextElementSibling;
        if(next){
            next.scrollIntoView({behavior:"smooth",block:"center"});
        }
    },300);
}

/* NAVIGATION */
function showPage(index){

    let pages = document.querySelectorAll(".page");

    pages.forEach(p=>p.classList.remove("active"));

    if(index < pages.length){
        pages[index].classList.add("active");
    }

    currentPage=index;

    // show submit only last page
    document.getElementById("submitBtn").style.display =
    (currentPage===totalPages-1) ? "block" : "none";
}

function nextPage(){
    if(currentPage < totalPages-1){
        showPage(currentPage+1);
    }
}

function prevPage(){
    if(currentPage > 0){
        showPage(currentPage-1);
    }
}
function updateProgress(){

    let totalAnswered = 0;

    for(let i=0;i<answers.length;i++){
        if(answers[i] !== null){
            totalAnswered++;
        }
    }

    let percent = Math.round((totalAnswered / answers.length) * 100);

    document.getElementById("progressBar").style.width = percent + "%";
    document.getElementById("progressText").innerText =
        `Progress: ${percent}% (${totalAnswered}/${answers.length})`;
}

/* RESULT */
function showResult(){

    let yes=answers.filter(a=>a===1).length;

    document.querySelectorAll(".page").forEach(p=>p.style.display="none");
    document.getElementById("resultPage").classList.add("active");

    document.getElementById("resultText").innerHTML =
    `Total YES: <b>${yes}</b><br>Total NO: <b>${122-yes}</b>`;
}

</script>

</body>
</html>
